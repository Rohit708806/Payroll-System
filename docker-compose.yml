version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/payroll_system
      - SESSION_SECRET=${SESSION_SECRET:-change-this-secret-in-production}
      - APP_URL=http://localhost:5000
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  seed:
    build: .
    command: node seeders/seed.js
    environment:
      - MONGODB_URI=mongodb://mongo:27017/payroll_system
    depends_on:
      - mongo
    profiles:
      - seed

volumes:
  mongo_data:
  uploads_data:
